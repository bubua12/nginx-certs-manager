# ============ certs.bubua12.com ============
server {
    if ($host = certs.bubua12.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name certs.bubua12.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name certs.bubua12.com;

    ssl_certificate /etc/letsencrypt/live/certs.bubua12.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/certs.bubua12.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    limit_req zone=global burst=200 nodelay;
    limit_conn conn_limit 50;
    if ($bad_bot) { return 403; }
    if ($bad_uri) { return 403; }

    # 前端静态文件（由 nginx 直接 serve，性能更好）
    root /var/www/certs-bubua12-com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到 Go 后端
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
